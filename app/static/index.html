<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Investigator Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f6f8fc; color: #1f2937; }
    .container { max-width: 900px; margin: auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08); }
    h1 { margin-top: 0; }
    label { display: block; margin: 16px 0 8px; font-weight: 600; }
    textarea, input, button { width: 100%; font: inherit; }
    textarea { min-height: 140px; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; resize: vertical; }
    input { padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { margin-top: 20px; padding: 14px; border: none; border-radius: 10px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    pre { background: #f3f4f6; border-radius: 10px; padding: 16px; overflow-x: auto; }
    .hint { color: #475569; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ticket Investigator</h1>
    <p class="hint">Enter a complaint and optional transaction history, then click Analyze.</p>

    <label for="ticket_id">Ticket ID</label>
    <input id="ticket_id" value="TKT-001" />

    <label for="complaint">Complaint</label>
    <textarea id="complaint">I sent 5000 taka to a wrong number (+8801719876543) around 2pm today.</textarea>

    <label for="transaction_history">Transaction History (JSON)</label>
    <textarea id="transaction_history">[
  {
    "transaction_id": "TXN-9101",
    "timestamp": "2026-04-14T14:08:22Z",
    "type": "transfer",
    "amount": 5000,
    "counterparty": "+8801719876543",
    "status": "completed"
  }
]</textarea>

    <button id="analyze">Analyze Ticket</button>

    <h2>Response</h2>
    <pre id="result">Waiting for analysis...</pre>
  </div>

  <script>
    const analyzeButton = document.getElementById('analyze');
    const resultBox = document.getElementById('result');
    analyzeButton.addEventListener('click', async () => {
      const payload = {
        ticket_id: document.getElementById('ticket_id').value.trim(),
        complaint: document.getElementById('complaint').value.trim(),
        transaction_history: JSON.parse(document.getElementById('transaction_history').value || '[]')
      };
      resultBox.textContent = 'Analyzing...';
      try {
        const res = await fetch('/analyze-ticket', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const body = await res.json();
        resultBox.textContent = JSON.stringify(body, null, 2);
      } catch (error) {
        resultBox.textContent = 'Request failed: ' + error;
      }
    });
  </script>
</body>
</html>
